version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-21600}
    volumes:
      - ./backend/chroma_db_final:/app/chroma_db_final
      - ./backend/models:/app/models
      - ./backend/reviews.db:/app/reviews.db
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
